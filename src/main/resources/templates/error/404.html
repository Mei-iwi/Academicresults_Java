<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Page not found</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <main class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <div class="card text-center" style="max-width:620px">
      <div class="card-body p-4">
        <div class="metric-value text-danger">404</div>
        <h1 class="fw-bold">Page not found</h1>
        <p class="text-muted">The page may have been moved, renamed, or removed.</p>
        <div class="action-group justify-content-center">
          <a class="btn btn-primary" th:href="@{/login}">Back to login</a>
          <a class="btn btn-light" href="javascript:history.back()">Go back</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
