<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bảng điều khiển sinh viên</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<style>
  .topbar,
  .topbar * {
    color: white;
  }

  .topbar a {
    color: white;
    text-decoration: none;
  }
</style>

<body data-role="student">
  <div class="app-shell">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-student">
      <img th:src="@{/images/logoSV.png}" alt="">
      <div class="sidebar-body" th:replace="~{layouts/student-layout :: sidebar('dashboard')}"></div>
      <div class="sidebar-footer" th:replace="~{layouts/User :: logout}"></div>
    </aside>
    <main class="main">
      <header class="topbar d-flex justify-content-between align-items-center bg-primary">
        <div>
          <h1 class="page-title">Bảng điều khiển sinh viên</h1>
          <div class="page-subtitle">
            <span th:text="${student.studentCode}">SV001</span>
            <span> - </span>
            <span th:text="${student.fullName}">Nguyễn Văn A</span>
          </div>
        </div>
        <div class="ms-auto" th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}">
        </div>
      </header>
      <section class="content">
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <div class="card metric-card">
              <div class="card-body">
                <div class="metric-label">Môn đã công bố</div>
                <div class="metric-value" th:text="${#lists.size(results)}">0</div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card metric-card">
              <div class="card-body">
                <div class="metric-label">Điểm trung bình tích lũy</div>
                <div class="metric-value" th:text="${gpa}">0.00</div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card metric-card">
              <div class="card-body">
                <div class="metric-label">Trạng thái học tập</div>
                <div class="metric-value"
                  th:text="${student.status.name() == 'STUDYING' ? 'Đang học' : (student.status.name() == 'PAUSED' ? 'Tạm nghỉ' : (student.status.name() == 'GRADUATED' ? 'Đã tốt nghiệp' : 'Thôi học'))}">
                  Đang học</div>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><strong>Kết quả mới công bố</strong></div>
          <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Môn học</th>
                  <th>Tổng điểm</th>
                  <th>Điểm chữ</th>
                  <th>Kết quả</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="r:${results}">
                  <td th:text="${r.section.subject.subjectName}">Tên môn học</td>
                  <td th:text="${r.totalScore}">0</td>
                  <td th:text="${r.letterGrade}">A</td>
                  <td>
                    <span class="badge" th:classappend="${r.totalScore >= 4} ? ' bg-success' : ' bg-danger'"
                      th:text="${r.totalScore >= 4 ? 'Đạt' : 'Không đạt'}">Đạt</span>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(results)}">
                  <td colspan="4" class="text-center text-muted py-4">Chưa có kết quả được công bố.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
