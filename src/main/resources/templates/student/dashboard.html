<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body data-role="student">
<div class="app-shell">
  <aside class="sidebar sidebar-student">
    <div class="sidebar-body" th:replace="~{layouts/student-layout :: sidebar('dashboard')}"></div>
    <div class="sidebar-footer" th:replace="~{layouts/User :: logout}"></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div><h1 class="page-title">Student Dashboard</h1><div class="page-subtitle" th:text="${student.fullName}"></div></div>
      <div class="ms-auto" th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}"></div>
    </header>
    <section class="content">
      <div class="row mb-3">
        <div class="col-md-4"><div class="card metric-card"><div class="card-body"><div class="metric-label">Published subjects</div><div class="metric-value" th:text="${#lists.size(results)}">0</div></div></div></div>
        <div class="col-md-4"><div class="card metric-card"><div class="card-body"><div class="metric-label">GPA</div><div class="metric-value" th:text="${gpa}">0.00</div></div></div></div>
        <div class="col-md-4"><div class="card metric-card"><div class="card-body"><div class="metric-label">Status</div><div class="metric-value" th:text="${student.status}"></div></div></div></div>
      </div>
      <div class="card">
        <div class="card-header"><strong>Recent published results</strong></div>
        <div class="card-body table-responsive">
          <table class="table table-hover">
            <thead><tr><th>Subject</th><th>Total</th><th>Letter</th><th>Result</th></tr></thead>
            <tbody>
              <tr th:each="r:${results}">
                <td th:text="${r.section.subject.subjectName}"></td>
                <td th:text="${r.totalScore}"></td>
                <td th:text="${r.letterGrade}"></td>
                <td><span class="badge" th:classappend="${r.totalScore >= 4} ? ' bg-success' : ' bg-danger'" th:text="${r.totalScore >= 4 ? 'PASS' : 'FAIL'}"></span></td>
              </tr>
              <tr th:if="${#lists.isEmpty(results)}"><td colspan="4" class="text-center text-muted">No published results.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>
</body>
</html>
