<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lỗi hệ thống</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <main class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <div class="card text-center" style="max-width:620px">
      <div class="card-body p-4">
        <div class="metric-value text-danger" th:text="${status ?: 'Lỗi'}">Lỗi</div>
        <h1 class="fw-bold">Đã xảy ra lỗi</h1>
        <p class="text-muted" th:text="${message ?: 'Vui lòng thử lại hoặc liên hệ quản trị viên.'}">Vui lòng thử lại.</p>
        <div class="action-group justify-content-center">
          <a class="btn btn-primary" th:href="@{/login}">Về trang đăng nhập</a>
          <a class="btn btn-light" href="javascript:history.back()">Quay lại</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
