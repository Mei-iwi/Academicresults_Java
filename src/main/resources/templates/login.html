<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập | Quản lý kết quả học tập</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/login.css}">

</head>

<style>
  body.auth-page {
    background-image: url('/images/bg.png');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
  }
</style>

<body class="auth-page">
  <main class="auth-wrapper">
    <section class="auth-card">
      <section class="auth-form-panel">
        <div class="auth-form-box">
          <div class="auth-mobile-brand">
            <img style="width: 50px;height: 50px;border-radius: 100%;" th:src="@{/images/logo.jpg}" alt="not found">
            <div>
              <div class="auth-brand-name">Quản lý kết quả học tập</div>
              <div class="auth-brand-subtitle">Hệ thống quản lý kết quả học tập</div>
            </div>
          </div>

          <div class="auth-form-heading">
            <h2 class="text-center">Đăng nhập hệ thống</h2>
            <p>Hệ thống quản lý kết quả học tập</p>
          </div>

          <div class="alert alert-danger auth-alert" th:if="${param.error}">Tên đăng nhập hoặc mật khẩu không đúng.
          </div>
          <div class="alert alert-danger auth-alert" th:if="${param.disabled}">Tài khoản đã bị khóa.</div>
          <div class="alert alert-success auth-alert" th:if="${param.logout}">Bạn đã đăng xuất khỏi hệ thống.</div>

          <form method="post" th:action="@{/login}" class="auth-form">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group-custom">
              <label for="username">Tên đăng nhập</label>
              <input type="text" class="form-control" id="username" name="username" autocomplete="username" autofocus
                required>
            </div>
            <div class="form-group-custom">
              <label for="password">Mật khẩu</label>
              <input type="password" class="form-control" id="password" name="password" autocomplete="current-password"
                required>
            </div>
            <div style="margin-left: 50px;" class="auth-options">
              <label class="remember-box"><input class="form-check-input" type="checkbox" name="remember-me"><span>Ghi
                  nhớ đăng nhập</span></label>
            </div>
            <button type="submit" class="btn-login"><strong style="color: white;">Đăng nhập</strong></button>
          </form>
        </div>
      </section>
    </section>
  </main>
</body>

</html>
