<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nhân viên Layout | Quản lý kết quả học tập</title>
  <link rel="stylesheet" href="../../bootstrap/css/bootstrap-local.css" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" href="../../css/app.css" th:href="@{/css/app.css}">
</head>

<body data-role="employee">
<div class="app-shell">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar sidebar-employee" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">KQ</div>
      <div>
        <div class="sidebar-title">Quản lý kết quả</div>
        <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
      </div>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-section">Menu Nhân viên giáo vụ</div>
      <nav class="sidebar-nav">
        <a class="" href="/employee/departments" th:href="@{/employee/departments}"><span class="icon">🏢</span><span>Khoa</span></a>
        <a class="" href="/employee/majors" th:href="@{/employee/majors}"><span class="icon">🧭</span><span>Ngành</span></a>
        <a class="" href="/employee/classes" th:href="@{/employee/classes}"><span class="icon">🏫</span><span>Lớp</span></a>
        <a class="" href="/employee/students" th:href="@{/employee/students}"><span class="icon">🎓</span><span>Sinh viên</span></a>
        <a class="" href="/employee/subjects" th:href="@{/employee/subjects}"><span class="icon">📚</span><span>Môn học</span></a>
        <a class="" href="/employee/academic-years" th:href="@{/employee/academic-years}"><span class="icon">📅</span><span>Năm học</span></a>
        <a class="" href="/employee/semesters" th:href="@{/employee/semesters}"><span class="icon">🗓</span><span>Học kỳ</span></a>
        <a class="" href="/employee/course-sections" th:href="@{/employee/course-sections}"><span class="icon">🧩</span><span>Lớp học phần</span></a>
        <a class="" href="/employee/results" th:href="@{/employee/results}"><span class="icon">📝</span><span>Nhập điểm</span></a>
        <a class="" href="/employee/reports" th:href="@{/employee/reports}"><span class="icon">📊</span><span>Báo cáo</span></a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit" class="logout-button"><span class="icon">↩</span><span>Đăng xuất</span></button>
      </form>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button type="button" class="sidebar-toggle" id="sidebarToggle" data-toggle-sidebar>☰</button>
      <div>
        <h1 class="page-title" layout:fragment="pageTitle">Tiêu đề trang</h1>
        <div class="page-subtitle">Hệ thống quản lý kết quả học tập</div>
      </div>
    </header>
    <section class="content" layout:fragment="content">
      <div class="empty-state">Nội dung trang con đặt tại đây.</div>
    </section>
  </main>
</div>
<script src="../../bootstrap/js/bootstrap-local.js" th:src="@{/bootstrap/js/bootstrap-local.js}"></script>
<script src="../../js/app.js" th:src="@{/js/app.js}"></script>
</body>
</html>
