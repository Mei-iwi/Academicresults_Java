<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<body>
  <div th:fragment="User(user, role)">
    <div class="text-right">
      <div><strong>Xin chào:</strong> <span th:text="${user}">Người dùng</span></div>
      <span class="badge bg-light text-dark"
        th:text="${role == 'ADMIN' ? 'Quản trị viên' : (role == 'EMPLOYEE' ? 'Nhân viên giáo vụ' : 'Sinh viên')}">Vai
        trò</span>
    </div>
  </div>

  <div th:fragment="logout">
    <form th:action="@{/logout}" method="post" class="logout-form">
      <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="logout-button"><span class="icon">↩</span> Đăng xuất</button>
    </form>
  </div>
</body>

</html>
