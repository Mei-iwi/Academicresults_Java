<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
  <div class="sidebar-body" th:fragment="sidebar(activeMenu)">
    <div class="sidebar-section">Student Menu</div>
    <nav class="sidebar-nav">
      <a href="/student/dashboard" th:href="@{/student/dashboard}" th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
        <span class="icon">Home</span><span>Dashboard</span>
      </a>
      <a href="/student/profile" th:href="@{/student/profile}" th:classappend="${activeMenu == 'profile'} ? ' active' : ''">
        <span class="icon">ID</span><span>Profile</span>
      </a>
      <a href="/student/results" th:href="@{/student/results}" th:classappend="${activeMenu == 'results'} ? ' active' : ''">
        <span class="icon">R</span><span>Results</span>
      </a>
      <a href="/student/transcript" th:href="@{/student/transcript}" th:classappend="${activeMenu == 'transcript'} ? ' active' : ''">
        <span class="icon">GPA</span><span>Transcript</span>
      </a>
    </nav>
  </div>
</body>
</html>
