<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<body>

  <div class="sidebar-body" th:fragment="sidebar(activeMenu)">
    <div class="sidebar-section">Menu Sinh viên</div>

    <nav class="sidebar-nav">

      <a href="/student/dashboard" th:href="@{/student/dashboard}"
        th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
        <span class="icon">🏠</span>
        <span>Trang chủ</span>
      </a>

      <a href="/student/results" th:href="@{/student/results}"
        th:classappend="${activeMenu == 'results'} ? ' active' : ''">
        <span class="icon">📄</span>
        <span>Bảng điểm học kỳ</span>
      </a>

      <a href="/student/transcript" th:href="@{/student/transcript}"
        th:classappend="${activeMenu == 'transcript'} ? ' active' : ''">
        <span class="icon">🎓</span>
        <span>Bảng điểm tổng hợp</span>
      </a>

    </nav>
  </div>

</body>

</html>
