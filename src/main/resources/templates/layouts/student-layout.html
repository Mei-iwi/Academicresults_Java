<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sinh viên Layout | Quản lý kết quả học tập</title>
  <link rel="stylesheet" href="../../bootstrap/css/bootstrap-local.css" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" href="../../css/app.css" th:href="@{/css/app.css}">
</head>

<body data-role="student">
<div class="app-shell">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar sidebar-student" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">KQ</div>
      <div>
        <div class="sidebar-title">Quản lý kết quả</div>
        <div class="sidebar-subtitle">Sinh viên</div>
      </div>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-section">Menu Sinh viên</div>
      <nav class="sidebar-nav">
        <a class="" href="/student/dashboard" th:href="@{/student/dashboard}"><span class="icon">🏠</span><span>Trang chủ</span></a>
        <a class="" href="/student/results" th:href="@{/student/results}"><span class="icon">📄</span><span>Bảng điểm học kỳ</span></a>
        <a class="" href="/student/transcript" th:href="@{/student/transcript}"><span class="icon">🎓</span><span>Bảng điểm tổng hợp</span></a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <form th:action="@{/logout}" method="post" class="logout-form">
        <button type="submit" class="logout-button"><span class="icon">↩</span><span>Đăng xuất</span></button>
      </form>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button type="button" class="sidebar-toggle" id="sidebarToggle" data-toggle-sidebar>☰</button>
      <div>
        <h1 class="page-title" layout:fragment="pageTitle">Tiêu đề trang</h1>
        <div class="page-subtitle">Hệ thống quản lý kết quả học tập</div>
      </div>
    </header>
    <section class="content" layout:fragment="content">
      <div class="empty-state">Nội dung trang con đặt tại đây.</div>
    </section>
  </main>
</div>
<script src="../../bootstrap/js/bootstrap-local.js" th:src="@{/bootstrap/js/bootstrap-local.js}"></script>
<script src="../../js/app.js" th:src="@{/js/app.js}"></script>
</body>
</html>
