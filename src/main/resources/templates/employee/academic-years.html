<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Năm học | Quản lý kết quả học tập</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<style>
  .topbar,
  .topbar * {
    color: white;
  }

  .topbar a {
    color: white;
    text-decoration: none;
  }
</style>

<body data-role="employee">
  <div class="app-shell">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-employee">
      <div class="sidebar-brand">
        <div class="brand-mark"><img style="width: 50px;height: 50px;border-radius: 100%;" th:src="@{/images/logo.jpg}"
            alt="not found"></div>
        <div>
          <div class="sidebar-title">Quản lý kết quả học tập</div>
          <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
        </div>
      </div>
      <div th:replace="~{layouts/employee-layout :: sidebar('academic-years')}"></div>
      <div class="sidebar-footer" th:replace="~{layouts/User :: logout}"></div>
    </aside>
    <main class="main">
      <header class="topbar d-flex justify-content-between align-items-center bg-primary">
        <button class="btn btn-light mobile-toggle" data-toggle-sidebar>Danh mục</button>
        <div>
          <h1 class="page-title">Năm học</h1>
          <div class="page-subtitle">Quản lý khoảng thời gian của từng năm học.</div>
        </div>
        <div class="ms-auto" th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}">
        </div>
      </header>
      <section class="content">
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="row g-3">
          <div class="col-lg-4">
            <form class="card card-body" method="post" th:action="@{/employee/academic-years}"
              th:object="${academicYear}">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <h2 class="h6 mb-3">Thêm năm học</h2>
              <label class="form-label required">Tên năm học</label><input class="form-control mb-3"
                th:field="*{yearName}" placeholder="2025-2026" required>
              <label class="form-label">Ngày bắt đầu</label><input class="form-control mb-3" type="date"
                th:field="*{startDate}">
              <label class="form-label">Ngày kết thúc</label><input class="form-control mb-3" type="date"
                th:field="*{endDate}">
              <button class="btn btn-primary">Lưu năm học</button>
            </form>
          </div>
          <div class="col-lg-8">
            <div class="card">
              <div class="card-header"><strong>Danh sách năm học</strong></div>
              <div class="card-body table-responsive">
                <table class="table table-hover align-middle">
                  <thead>
                    <tr>
                      <th>Tên năm học</th>
                      <th>Bắt đầu</th>
                      <th>Kết thúc</th>
                      <th class="text-end">Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="y : ${academicYears}">
                      <td colspan="4">
                        <form class="row g-2 align-items-center" method="post" th:action="@{/employee/academic-years}">
                          <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                            th:value="${_csrf.token}">
                          <input type="hidden" name="id" th:value="${y.id}">
                          <div class="col-md-3"><input class="form-control form-control-sm" name="yearName"
                              th:value="${y.yearName}" required></div>
                          <div class="col-md-3"><input class="form-control form-control-sm" type="date" name="startDate"
                              th:value="${y.startDate}"></div>
                          <div class="col-md-3"><input class="form-control form-control-sm" type="date" name="endDate"
                              th:value="${y.endDate}"></div>
                          <div class="col-md-3 text-end"><button class="btn btn-sm btn-outline-primary">Cập
                              nhật</button> <button class="btn btn-sm btn-danger"
                              th:formaction="@{/employee/academic-years/delete/{id}(id=${y.id})}"
                              onclick="return confirm('Xóa năm học này?')">Xóa</button></div>
                        </form>
                      </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(academicYears)}">
                      <td colspan="4" class="text-center text-muted py-4">Chưa có năm học.</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
