<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="route" content="/employee/classes">
  <title>Quản lý lớp | Quản lý kết quả học tập</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<style>
  .topbar,
  .topbar * {
    color: white;
  }

  .topbar a {
    color: white;
    text-decoration: none;
  }
</style>

<body data-role="employee">
  <div class="app-shell">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-employee" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark"><img style="width: 50px;height: 50px;border-radius: 100%;" th:src="@{/images/logo.jpg}"
            alt="not found"></div>
        <div>
          <div class="sidebar-title">Quản lý kết quả</div>
          <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
        </div>
      </div>
      <div class="sidebar-body" th:replace="~{/layouts/employee-layout :: sidebar('classes')}"></div>
      <div class="sidebar-footer" th:replace="~{layouts/User :: logout}"></div>
    </aside>
    <main class="main">
      <header class="topbar d-flex justify-content-between align-items-center bg-primary">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light mobile-toggle" data-toggle-sidebar>☰</button>
          <div>
            <h1 class="page-title">Quản lý lớp</h1>
            <div class="page-subtitle">Quản lý lớp sinh viên theo ngành và năm học.</div>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 ms-auto text-end"
          th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}"></div>
      </header>
      <section class="content">
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="card card-body mb-3" method="get" th:action="@{/employee/classes}">
          <div class="row g-3 align-items-end">
            <div class="col-md-10">
              <label class="form-label" for="keyword">Từ khóa</label>
              <input id="keyword" class="form-control" name="keyword" placeholder="Mã lớp hoặc tên lớp">
            </div>
            <div style="margin-top: 30px;margin-left: 10px;" class="col-md-2"><button
                class="btn btn-primary w-100">Lọc</button></div>
          </div>
        </form>

        <div class="card mb-3">
          <div class="card-header"><strong>Thêm lớp</strong></div>
          <div class="card-body">
            <form class="row g-3" method="post" th:action="@{/employee/classes}" th:object="${studentClass}">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <div class="col-md-3"><label class="form-label required">Mã lớp</label><input class="form-control"
                  th:field="*{classCode}" required></div>
              <div class="col-md-3"><label class="form-label required">Tên lớp</label><input class="form-control"
                  th:field="*{className}" required></div>
              <div class="col-md-2"><label class="form-label required">Ngành</label><select class="form-select"
                  th:field="*{major.id}" required>
                  <option value="">Chọn ngành</option>
                  <option th:each="m:${majors}" th:value="${m.id}" th:text="${m.majorCode + ' - ' + m.majorName}">
                  </option>
                </select></div>
              <div style="margin-left: 10px;" class="col-md-2"><label class="form-label required">Năm học</label><select
                  class="form-select" th:field="*{academicYear.id}" required>
                  <option value="">Chọn năm</option>
                  <option th:each="y:${academicYears}" th:value="${y.id}" th:text="${y.yearName}"></option>
                </select></div>
              <div style="margin-left: 10px;" class="col-md-1"><label class="form-label">Trạng thái</label><select
                  class="form-select" th:field="*{status}">
                  <option th:each="s:${statuses}" th:value="${s}"
                    th:text="${s.name() == 'ACTIVE' ? 'Hoạt động' : 'Ngừng'}"></option>
                </select></div>
              <div style="margin-left: 10px;" class="col-md-1 d-flex align-items-end">
                <button style="height: 40px;margin-top: 30px;" class="btn btn-primary h-50">Lưu</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><strong>Danh sách lớp</strong></div>
          <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Mã lớp</th>
                  <th>Tên lớp</th>
                  <th>Ngành</th>
                  <th>Năm học</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="clazz:${classes}">
                  <td th:text="${clazz.classCode}">Lớp</td>
                  <td th:text="${clazz.className}">Tên lớp</td>
                  <td th:text="${clazz.major.majorName}">Ngành</td>
                  <td th:text="${clazz.academicYear.yearName}">Năm</td>
                  <td><span class="badge"
                      th:classappend="${clazz.status.name() == 'ACTIVE' ? ' bg-success' : ' bg-secondary'}"
                      th:text="${clazz.status.name() == 'ACTIVE' ? 'Hoạt động' : 'Ngừng'}">Hoạt động</span></td>
                  <td>
                    <div class="d-flex flex-wrap gap-1">
                      <button class="btn btn-sm btn-outline-primary" type="button" data-open-modal
                        th:attr="data-open-modal='#editClass' + ${clazz.id}">Sửa</button>
                      <form method="post" th:action="@{/employee/classes/delete/{id}(id=${clazz.id})}"
                        onsubmit="return confirm('Bạn chắc chắn muốn xóa lớp này?');">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-danger">Xóa</button>
                      </form>
                    </div>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(classes)}">
                  <td colspan="6" class="text-center text-muted py-4">Chưa có lớp.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="modal" th:each="clazz:${classes}" th:id="${'editClass' + clazz.id}">
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header"><strong>Cập nhật lớp</strong><button class="btn btn-sm btn-light"
                  data-close-modal type="button">Đóng</button></div>
              <form method="post" th:action="@{/employee/classes}">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}">
                <input type="hidden" name="id" th:value="${clazz.id}">
                <div class="modal-body row g-3">
                  <div class="col-md-6"><label class="form-label required">Mã lớp</label><input class="form-control"
                      name="classCode" th:value="${clazz.classCode}" required></div>
                  <div class="col-md-6"><label class="form-label required">Tên lớp</label><input class="form-control"
                      name="className" th:value="${clazz.className}" required></div>
                  <div class="col-md-4"><label class="form-label required">Ngành</label><select class="form-select"
                      name="major.id" required>
                      <option th:each="m:${majors}" th:value="${m.id}" th:selected="${clazz.major.id == m.id}"
                        th:text="${m.majorCode + ' - ' + m.majorName}"></option>
                    </select></div>
                  <div class="col-md-4"><label class="form-label required">Năm học</label><select class="form-select"
                      name="academicYear.id" required>
                      <option th:each="y:${academicYears}" th:value="${y.id}"
                        th:selected="${clazz.academicYear.id == y.id}" th:text="${y.yearName}"></option>
                    </select></div>
                  <div class="col-md-4"><label class="form-label">Trạng thái</label><select class="form-select"
                      name="status">
                      <option th:each="s:${statuses}" th:value="${s}" th:selected="${clazz.status == s}"
                        th:text="${s.name() == 'ACTIVE' ? 'Hoạt động' : 'Ngừng'}"></option>
                    </select></div>
                </div>
                <div class="modal-footer"><button class="btn btn-light" type="button"
                    data-close-modal>Hủy</button><button class="btn btn-primary">Lưu thay đổi</button></div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script th:src="@{/bootstrap/js/bootstrap-local.js}"></script>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
