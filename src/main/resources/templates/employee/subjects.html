<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Môn học | Quản lý kết quả học tập</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<style>
  .topbar,
  .topbar * {
    color: white;
  }

  .topbar a {
    color: white;
    text-decoration: none;
  }
</style>

<body data-role="employee">
  <div class="app-shell">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-employee">
      <div class="sidebar-brand">
        <div class="brand-mark"><img style="width: 50px;height: 50px;border-radius: 100%;" th:src="@{/images/logo.jpg}"
            alt="not found"></div>
        <div>
          <div class="sidebar-title">Quản lý kết quả học tập</div>
          <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
        </div>
      </div>
      <div th:replace="~{layouts/employee-layout :: sidebar('subjects')}"></div>
      <div class="sidebar-footer" th:replace="~{layouts/User :: logout}"></div>
    </aside>
    <main class="main">
      <header class="topbar d-flex justify-content-between align-items-center bg-primary">
        <button class="btn btn-light mobile-toggle" data-toggle-sidebar>Danh mục</button>
        <div>
          <h1 class="page-title">Môn học</h1>
          <div class="page-subtitle">Quản lý danh mục môn học và trạng thái sử dụng.</div>
        </div>
        <div class="ms-auto" th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}">
        </div>
      </header>
      <section class="content">
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="row g-3">
          <div class="col-lg-4">
            <form class="card card-body" method="post" th:action="@{/employee/subjects}" th:object="${subject}">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <h2 class="h6 mb-3">Thêm môn học</h2>
              <label class="form-label required">Mã môn học</label><input class="form-control mb-3"
                th:field="*{subjectCode}" required>
              <label class="form-label required">Tên môn học</label><input class="form-control mb-3"
                th:field="*{subjectName}" required>
              <label class="form-label required">Số tín chỉ</label><input class="form-control mb-3" type="number"
                min="1" th:field="*{credits}" required>
              <label class="form-label">Trạng thái</label><select class="form-select mb-3" th:field="*{active}">
                <option value="true">Hoạt động</option>
                <option value="false">Ngừng sử dụng</option>
              </select>
              <button class="btn btn-primary">Lưu môn học</button>
            </form>
          </div>
          <div class="col-lg-8">
            <form method="get" th:action="@{/employee/subjects}" class="card card-body mb-3">
              <div class="row g-2">
                <div class="col"><input class="form-control" name="keyword" placeholder="Tìm theo mã hoặc tên môn học"
                    th:value="${param.keyword}"></div>
                <div class="col-auto"><button class="btn btn-primary">Tìm kiếm</button></div>
              </div>
            </form>
            <div class="card">
              <div class="card-header"><strong>Danh sách môn học</strong></div>
              <div class="card-body table-responsive">
                <table class="table table-hover align-middle">
                  <thead>
                    <tr>
                      <th>Mã</th>
                      <th>Tên môn học</th>
                      <th>Tín chỉ</th>
                      <th>Trạng thái</th>
                      <th class="text-end">Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="s : ${subjects}">

                      <form class="row g-2 align-items-center" method="post" th:action="@{/employee/subjects}">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}">
                        <input type="hidden" name="id" th:value="${s.id}">
                        <td class="col-md-2"><input class="form-control form-control-sm" name="subjectCode"
                            th:value="${s.subjectCode}" required>
                        </td>
                        <td class="col-md-2"><input class="form-control form-control-sm" name="subjectName"
                            th:value="${s.subjectName}" required>
                        </td>
                        <td class="col-md-2"><input class="form-control form-control-sm" name="credits" type="number"
                            min="1" th:value="${s.credits}" required>
                        </td>
                        <td class="col-md-2"><select class="form-select form-select-sm" name="active">
                            <option value="true" th:selected="${s.active}">Hoạt động</option>
                            <option value="false" th:selected="${!s.active}">Ngừng sử dụng</option>
                          </select>
                        </td>
                        <td class="col-md-2 text-end d-flex">
                          <button class="btn btn-sm btn-outline-primary">Cập nhật</button>
                          <button style="margin-left: 10px;" class="btn btn-sm btn-danger"
                            th:formaction="@{/employee/subjects/delete/{id}(id=${s.id})}"
                            onclick="return confirm('Xóa môn học này?')">Xóa
                          </button>
                        </td>
              </div>
              </form>

              </tr>
              <tr th:if="${#lists.isEmpty(subjects)}">
                <td colspan="5" class="text-center text-muted py-4">Chưa có môn học phù hợp.</td>
              </tr>
              </tbody>
              </table>
            </div>
          </div>
        </div>
  </div>
  </section>
  </main>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
