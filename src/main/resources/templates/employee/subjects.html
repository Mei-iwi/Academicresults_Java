<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="route" content="/employee/subjects">
  <title>Quản lý môn học | Quản lý kết quả học tập</title>
  <link rel="stylesheet" href="../../bootstrap/css/bootstrap-local.css" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" href="../../css/app.css" th:href="@{/css/app.css}">
</head>

<body data-role="employee">
  <div class="app-shell">

    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-employee" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">KQ</div>
        <div>
          <div class="sidebar-title">Quản lý kết quả</div>
          <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
        </div>
      </div>
      <div class="sidebar-body">
        <div th:replace="~{/layouts/employee-layout :: sidebar('subjects')}"></div>

      </div>
      <div class="sidebar-footer">
        <div th:replace="~{layouts/User :: logout}"></div>

      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light mobile-toggle" data-toggle-sidebar>☰</button>
          <div>
            <h1 class="page-title">Quản lý môn học</h1>
            <div class="page-subtitle">Danh sách môn, thêm/sửa và bật/tắt sử dụng.</div>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 ms-auto text-end">
          <div th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}"></div>

        </div>
      </header>
      <section class="content">
        <div class="row">
          <div class="col-lg-4 mb-4">
            <div class="card">
              <div class="card-header"><strong>Thông tin môn học</strong></div>
              <div class="card-body">
                <div class="mb-3"><label class="form-label required">Mã môn</label><input class="form-control"
                    value="JAVA"></div>
                <div class="mb-3"><label class="form-label required">Tên môn</label><input class="form-control"
                    value="Công nghệ Java"></div>
                <div class="mb-3"><label class="form-label required">Số tín chỉ</label><input type="number"
                    class="form-control" value="3"></div>
                <div class="mb-3"><label class="form-label">Trạng thái</label><select class="form-select">
                    <option>Đang sử dụng</option>
                    <option>Tạm ngưng</option>
                  </select></div><button class="btn btn-primary" data-action="save">Lưu môn học</button>
              </div>
            </div>
          </div>
          <div class="col-lg-8 mb-4">
            <div class="card">
              <div class="card-header d-flex justify-content-between"><strong>Danh sách môn học</strong><input
                  class="form-control" style="max-width:260px" data-table-search="#subjectTable"
                  placeholder="Tìm mã/tên môn"></div>
              <div class="card-body table-responsive">
                <table id="subjectTable" class="table table-hover">
                  <thead>
                    <tr>
                      <th>Mã môn</th>
                      <th>Tên môn</th>
                      <th>Tín chỉ</th>
                      <th>Trạng thái</th>
                      <th>Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>JAVA</td>
                      <td>Công nghệ Java</td>
                      <td>3</td>
                      <td><span class="badge bg-success">Đang dùng</span></td>
                      <td class="action-group"><button class="btn btn-sm btn-outline-primary">Sửa</button><button
                          class="btn btn-sm btn-secondary" data-action="lock">Tắt</button></td>
                    </tr>
                    <tr>
                      <td>CSDL</td>
                      <td>Hệ cơ sở dữ liệu</td>
                      <td>3</td>
                      <td><span class="badge bg-success">Đang dùng</span></td>
                      <td class="action-group"><button class="btn btn-sm btn-outline-primary">Sửa</button><button
                          class="btn btn-sm btn-secondary" data-action="lock">Tắt</button></td>
                    </tr>
                    <tr>
                      <td>OOP</td>
                      <td>Lập trình hướng đối tượng</td>
                      <td>3</td>
                      <td><span class="badge bg-secondary">Tạm ngưng</span></td>
                      <td class="action-group"><button class="btn btn-sm btn-outline-primary">Sửa</button><button
                          class="btn btn-sm btn-success" data-action="save">Bật</button></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="../../bootstrap/js/bootstrap-local.js" th:src="@{/bootstrap/js/bootstrap-local.js}"></script>
  <script src="../../js/app.js" th:src="@{/js/app.js}"></script>
</body>

</html>
