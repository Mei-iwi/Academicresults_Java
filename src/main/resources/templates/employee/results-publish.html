<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="route" content="/employee/results-publish">
  <title>Công bố và khóa điểm | Quản lý kết quả học tập</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<style>
  .topbar,
  .topbar * {
    color: white;
  }

  .topbar a {
    color: white;
    text-decoration: none;
  }
</style>

<body data-role="employee">
  <div class="app-shell">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-employee" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark"><img style="width: 50px;height: 50px;border-radius: 100%;" th:src="@{/images/logo.jpg}"
            alt="not found"></div>
        <div>
          <div class="sidebar-title">Quản lý kết quả</div>
          <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
        </div>
      </div>
      <div class="sidebar-body" th:replace="~{/layouts/employee-layout :: sidebar('results-publish')}"></div>
      <div class="sidebar-footer" th:replace="~{layouts/User :: logout}"></div>
    </aside>
    <main class="main">
      <header class="topbar d-flex justify-content-between align-items-center bg-primary">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light mobile-toggle" data-toggle-sidebar>☰</button>
          <div>
            <h1 class="page-title">Công bố và khóa điểm</h1>
            <div class="page-subtitle">Kiểm tra trạng thái kết quả trước khi công bố hoặc khóa.</div>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 ms-auto text-end">
          <div th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}"></div>
        </div>
      </header>
      <section class="content">
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Danh sách kết quả</strong>
            <a class="btn btn-light btn-sm" th:href="@{/employee/results}">Quay lại nhập điểm</a>
          </div>
          <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Sinh viên</th>
                  <th>Lớp học phần</th>
                  <th>Học kỳ</th>
                  <th>Tổng điểm</th>
                  <th>Kết quả</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="result : ${results}">
                  <td><span th:text="${result.student.studentCode}">SV001</span><br><small
                      th:text="${result.student.fullName}">Sinh viên</small></td>
                  <td><span th:text="${result.section.sectionCode}">JAVA01</span><br><small
                      th:text="${result.section.subject.subjectName}">Môn học</small></td>
                  <td th:text="${result.section.semester.semesterName}">HK1</td>
                  <td th:text="${result.totalScore}">0</td>
                  <td>
                    <span class="badge" th:classappend="${result.totalScore >= 4} ? ' bg-success' : ' bg-danger'"
                      th:text="${result.totalScore >= 4 ? 'Đạt' : 'Không đạt'}">Đạt</span>
                  </td>
                  <td>
                    <span class="badge"
                      th:classappend="${result.resultStatus.name() == 'DRAFT' ? ' bg-warning text-dark' : (result.resultStatus.name() == 'PUBLISHED' ? ' bg-success' : ' bg-dark')}"
                      th:text="${result.resultStatus.name() == 'DRAFT' ? 'Nháp' : (result.resultStatus.name() == 'PUBLISHED' ? 'Đã công bố' : 'Đã khóa')}">Nháp</span>
                  </td>
                  <td>
                    <div class="d-flex flex-wrap gap-1">
                      <form method="post" th:action="@{/employee/results/{id}/status(id=${result.id})}"
                        th:if="${result.resultStatus.name() != 'LOCKED'}"
                        onsubmit="return confirm('Công bố kết quả này?');">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}">
                        <input type="hidden" name="status" value="PUBLISHED">
                        <button class="btn btn-sm btn-success">Công bố</button>
                      </form>
                      <form method="post" th:action="@{/employee/results/{id}/status(id=${result.id})}"
                        th:if="${result.resultStatus.name() != 'LOCKED'}"
                        onsubmit="return confirm('Khóa kết quả này?');">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}">
                        <input type="hidden" name="status" value="LOCKED">
                        <button class="btn btn-sm btn-warning">Khóa</button>
                      </form>
                    </div>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(results)}">
                  <td colspan="7" class="text-center text-muted py-4">Chưa có kết quả để công bố.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script th:src="@{/bootstrap/js/bootstrap-local.js}"></script>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
