<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Học kỳ | Quản lý kết quả học tập</title>
  <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<style>
  .topbar,
  .topbar * {
    color: white;
  }

  .topbar a {
    color: white;
    text-decoration: none;
  }
</style>

<body data-role="employee">
  <div class="app-shell">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-employee">
      <div class="sidebar-brand">
        <div class="brand-mark"><img style="width: 50px;height: 50px;border-radius: 100%;" th:src="@{/images/logo.jpg}"
            alt="not found"></div>
        <div>
          <div class="sidebar-title">Quản lý kết quả học tập</div>
          <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
        </div>
      </div>
      <div th:replace="~{layouts/employee-layout :: sidebar('semesters')}"></div>
      <div class="sidebar-footer" th:replace="~{layouts/User :: logout}"></div>
    </aside>
    <main class="main">
      <header class="topbar d-flex justify-content-between align-items-center bg-primary">
        <button class="btn btn-light mobile-toggle" data-toggle-sidebar>Danh mục</button>
        <div>
          <h1 class="page-title">Học kỳ</h1>
          <div class="page-subtitle">Quản lý học kỳ theo từng năm học.</div>
        </div>
        <div class="ms-auto" th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}">
        </div>
      </header>
      <section class="content">
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="row g-3">
          <div class="col-lg-4">
            <form class="card card-body" method="post" th:action="@{/employee/semesters}" th:object="${semester}">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <h2 class="h6 mb-3">Thêm học kỳ</h2>
              <label class="form-label required">Mã học kỳ</label><input class="form-control mb-3"
                th:field="*{semesterCode}" required>
              <label class="form-label required">Tên học kỳ</label><input class="form-control mb-3"
                th:field="*{semesterName}" required>
              <label class="form-label required">Năm học</label>
              <select class="form-select mb-3" th:field="*{academicYear.id}" required>
                <option value="">Chọn năm học</option>
                <option th:each="y : ${academicYears}" th:value="${y.id}" th:text="${y.yearName}"></option>
              </select>
              <label class="form-label">Ngày bắt đầu</label><input class="form-control mb-3" type="date"
                th:field="*{startDate}">
              <label class="form-label">Ngày kết thúc</label><input class="form-control mb-3" type="date"
                th:field="*{endDate}">
              <button class="btn btn-primary">Lưu học kỳ</button>
            </form>
          </div>
          <div class="col-lg-8">
            <form class="card card-body mb-3" method="get" th:action="@{/employee/semesters}">
              <div class="row g-2">
                <div class="col"><input class="form-control" name="keyword" placeholder="Tìm theo mã hoặc tên học kỳ"
                    th:value="${param.keyword}"></div>
                <div class="col-auto"><button class="btn btn-primary">Tìm kiếm</button></div>
              </div>
            </form>
            <div class="card">
              <div class="card-header"><strong>Danh sách học kỳ</strong></div>
              <div class="card-body table-responsive">
                <table class="table table-hover align-middle">
                  <thead>
                    <tr>
                      <th>Mã</th>
                      <th>Tên học kỳ</th>
                      <th>Năm học</th>
                      <th>Thời gian</th>
                      <th class="text-end">Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="s : ${semesters}">

                      <form class="row g-2 align-items-center" method="post" th:action="@{/employee/semesters}">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}">
                        <input type="hidden" name="id" th:value="${s.id}">
                        <td class=""><input class="form-control form-control-sm" name="semesterCode"
                            th:value="${s.semesterCode}" required></td>
                        <td class=""><input class="form-control form-control-sm" name="semesterName"
                            th:value="${s.semesterName}" required></td>
                        <td class=""><select class="form-select form-select-sm" name="academicYear.id" required>
                            <option th:each="y : ${academicYears}" th:value="${y.id}"
                              th:selected="${s.academicYear != null and s.academicYear.id == y.id}"
                              th:text="${y.yearName}"></option>
                          </select></td>
                        <td class=" gap-1"><input class="form-control form-control-sm" type="date" name="startDate"
                            th:value="${s.startDate}"><input class="form-control form-control-sm" type="date"
                            name="endDate" th:value="${s.endDate}"></td>
                        <td class="text-end">
                          <button style="margin-bottom: 5px;" class="btn btn-sm btn-outline-primary">Cập nhật</button>
                          <button class="btn btn-sm btn-danger"
                            th:formaction="@{/employee/semesters/delete/{id}(id=${s.id})}"
                            onclick="return confirm('Xóa học kỳ này?')">Xóa
                          </button>
                        </td>
                      </form>

                    </tr>
                    <tr th:if="${#lists.isEmpty(semesters)}">
                      <td colspan="5" class="text-center text-muted py-4">Chưa có học kỳ phù hợp.</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script th:src="@{/js/app.js}"></script>
</body>

</html>
