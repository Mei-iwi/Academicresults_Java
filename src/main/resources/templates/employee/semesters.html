<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="route" content="/employee/semesters">
  <title>Quản lý học kỳ | Quản lý kết quả học tập</title>
  <link rel="stylesheet" href="../../bootstrap/css/bootstrap-local.css" th:href="@{/bootstrap/css/bootstrap-local.css}">
  <link rel="stylesheet" href="../../css/app.css" th:href="@{/css/app.css}">
</head>

<body data-role="employee">
  <div class="app-shell">

    <div class="sidebar-overlay"></div>
    <aside class="sidebar sidebar-employee" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">KQ</div>
        <div>
          <div class="sidebar-title">Quản lý kết quả</div>
          <div class="sidebar-subtitle">Nhân viên giáo vụ</div>
        </div>
      </div>
      <div class="sidebar-body">
        <div th:replace="~{/layouts/employee-layout :: sidebar('semesters')}"></div>

      </div>
      <div class="sidebar-footer">
        <div th:replace="~{layouts/User :: logout}"></div>

      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light mobile-toggle" data-toggle-sidebar>☰</button>
          <div>
            <h1 class="page-title">Quản lý học kỳ</h1>
            <div class="page-subtitle">Tạo học kỳ để mở lớp học phần.</div>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 ms-auto text-end">
          <div th:replace="~{layouts/User :: User(${currentUser.displayName}, ${currentUser.roleCode})}"></div>

        </div>
      </header>
      <section class="content">
        <div class="row">
          <div class="col-lg-4 mb-4">
            <div class="card">
              <div class="card-header"><strong>Học kỳ</strong></div>
              <div class="card-body">
                <div class="mb-3"><label class="form-label required">Năm học</label><select class="form-select">
                    <option>2025-2026</option>
                    <option>2024-2025</option>
                  </select></div>
                <div class="mb-3"><label class="form-label required">Tên học kỳ</label><select class="form-select">
                    <option>Học kỳ 1</option>
                    <option>Học kỳ 2</option>
                    <option>Học kỳ hè</option>
                  </select></div>
                <div class="mb-3"><label class="form-label required">Thời gian</label><input class="form-control"
                    value="08/2025 - 12/2025"></div><button class="btn btn-primary" data-action="save">Lưu học
                  kỳ</button>
              </div>
            </div>
          </div>
          <div class="col-lg-8 mb-4">
            <div class="card">
              <div class="card-header"><strong>Danh sách học kỳ</strong></div>
              <div class="card-body table-responsive">
                <table class="table table-hover">
                  <thead>
                    <tr>
                      <th>Năm học</th>
                      <th>Học kỳ</th>
                      <th>Thời gian</th>
                      <th>Trạng thái</th>
                      <th>Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>2025-2026</td>
                      <td>Học kỳ 1</td>
                      <td>08/2025 - 12/2025</td>
                      <td><span class="badge bg-success">Đang mở</span></td>
                      <td><button class="btn btn-sm btn-outline-primary">Sửa</button></td>
                    </tr>
                    <tr>
                      <td>2025-2026</td>
                      <td>Học kỳ 2</td>
                      <td>01/2026 - 05/2026</td>
                      <td><span class="badge bg-warning">Chuẩn bị</span></td>
                      <td><button class="btn btn-sm btn-outline-primary">Sửa</button></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="../../bootstrap/js/bootstrap-local.js" th:src="@{/bootstrap/js/bootstrap-local.js}"></script>
  <script src="../../js/app.js" th:src="@{/js/app.js}"></script>
</body>

</html>
